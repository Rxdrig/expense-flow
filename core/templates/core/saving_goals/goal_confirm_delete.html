{% extends 'core/base.html' %}

{% block titulo %}Eliminar Meta{% endblock titulo %}

{% block contenido %}
<div class="main-panel">
  <div class="content-wrapper">
    <div class="row justify-content-center">
      <div class="col-lg-6 grid-margin stretch-card">
        <div class="card">
          <div class="card-body">
            <h4 class="card-title mb-4">Confirmar eliminación</h4>
            <p class="mb-4">¿Estás seguro de que deseas eliminar la meta de ahorro <strong>{{ goal.emoji }} {{ goal.title }}</strong>?</p>
            
            <form method="post">
              {% csrf_token %}
              <div class="d-flex gap-2">
                <a href="{% url 'saving_goals_list' %}" class="btn btn-outline-light">Cancelar</a>
                <button type="submit" class="btn btn-danger">Eliminar</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock contenido %}
