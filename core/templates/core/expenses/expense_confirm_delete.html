{% extends 'core/base.html' %}
{% load humanize %}

{% block titulo %}Eliminar gasto{% endblock titulo %}

{% block contenido %}
<div class="main-panel">
  <div class="content-wrapper">
    <div class="row justify-content-center">
      <div class="col-lg-6 grid-margin stretch-card">
        <div class="card">
          <div class="card-body text-center">
            <h4 class="card-title">Eliminar gasto</h4>
            <p class="mb-4">¿Seguro que deseas eliminar <strong>{{ expense.title }}</strong> por <strong>${{ expense.amount|floatformat:0|intcomma }}</strong>?</p>
            <form method="post">
              {% csrf_token %}
              <a href="{% url 'expense_list' %}" class="btn btn-outline-light mr-2">Cancelar</a>
              <button type="submit" class="btn btn-danger">Eliminar</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock contenido %}
